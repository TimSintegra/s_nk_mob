services:
  db:
    image: postgres:16
    container_name: worker_reports_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: worker_reports
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - worker_reports_postgres_data:/var/lib/postgresql/data

  web:
    build: .
    container_name: s_nk_mob_web
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      POSTGRES_HOST: worker_reports_db
      POSTGRES_PORT: "5432"
    depends_on:
      - db
    networks:
      - default
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.s-nk-mob.loadbalancer.server.port=8000"

networks:
  traefik:
    external: true
    name: docker_proxy-server-net

volumes:
  worker_reports_postgres_data: