{% extends "base.html" %}

{% block title %}Вход мастера{% endblock %}

{% block content %}
<h3 class="mb-4">Вход мастера</h3>

<form method="post">
    {% csrf_token %}

    <div class="mb-3">
        <label class="form-label">Телефон</label>
        <input type="text" name="phone" class="form-control app-input" placeholder="+7..." required>
    </div>

    <div class="mb-3">
        <label class="form-label">Пароль</label>
        <input type="password" name="password" class="form-control app-input" required>
    </div>

    <button class="app-button w-100">Войти</button>
</form>
{% endblock %}
