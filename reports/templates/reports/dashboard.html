{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="app-menu-item mb-3" style="cursor: default;">
    <div class="app-menu-icon app-menu-icon-primary">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="8" r="5"/><path d="M20 21a8 8 0 1 0-16 0"/>
        </svg>
    </div>
    <div class="app-menu-text">
        <h5>{{ master.full_name }}</h5>
        <small>{{ master.brigade.name|default:"" }}</small>
    </div>
    <a href="{% url 'master_logout' %}" class="ms-auto text-decoration-none" style="color: var(--text-muted);">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
    </a>
</div>

<a href="{% url 'work_node_list' %}" class="app-card app-card-primary text-center mb-3">
    <h4>＋ Выполнить работу</h4>
</a>

<a href="{% url 'timesheet' %}" class="app-menu-item mb-3">
    <div class="app-menu-icon app-menu-icon-success">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
    </div>
    <div class="app-menu-text">
        <h5>Табель</h5>
        <small>Учёт рабочего времени</small>
    </div>
</a>

<a href="{% url 'report_calendar' %}" class="app-menu-item">
    <div class="app-menu-icon app-menu-icon-warning">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
        </svg>
    </div>
    <div class="app-menu-text">
        <h5>Отчёты по датам</h5>
        <small>Просмотр и скачивание</small>
    </div>
</a>
{% endblock %}
