{% extends "base.html" %}

{% block content %}
<div class="d-flex align-items-center gap-2 mb-3">
    {% if work_node.parent %}
        <a href="{% url 'work_node_children' work_node.parent.id %}" class="app-back">‹ Назад</a>
    {% else %}
        <a href="{% url 'work_node_list' %}" class="app-back">‹ Назад</a>
    {% endif %}
</div>

<div class="app-node-header">
    <h5>{{ work_node.code|default:work_node.name }}</h5>
    <small>{{ work_node.name }}</small>
</div>

<form method="post">
    {% csrf_token %}

    <div class="mb-3">
        <label class="app-label">Дата</label>
        <input name="date" type="date" value="{{ today|date:'Y-m-d' }}" class="form-control app-input" required>
    </div>

    <div class="mb-3">
        <label class="app-label">Объект</label>
        <input name="site_name" class="form-control app-input" value="{{ remembered_site_name }}" required>
    </div>

    <div class="mb-3">
        <label class="app-label">Количество выполненного объёма</label>
        <div class="d-flex align-items-center gap-2">
            <input name="quantity" type="number" step="0.01" class="form-control app-input" style="flex: 1;" required>
            <small style="color: var(--text-secondary); font-size: 14px; white-space: nowrap;">{{ work_node.unit|default:"" }}</small>
        </div>
    </div>

    <div class="mb-3">
        <label class="app-label">Титул</label>
        <input name="title" class="form-control app-input" value="{{ remembered_title }}">
    </div>

    <div class="mb-3">
        <label class="app-label">Раздел проекта</label>
        <input name="project_section" class="form-control app-input">
    </div>

    <div class="mb-3">
        <label class="app-label">Комментарий</label>
        <textarea name="comment" class="form-control app-input"></textarea>
    </div>

    <div class="d-flex gap-3 mt-4">
        <button name="action" value="finish" class="app-btn flex-fill">
            Завершить отчёт
        </button>
        <button name="action" value="new" class="app-btn app-btn-outline flex-fill">
            Новый вид работ
        </button>
    </div>
</form>
{% endblock %}
