{% extends "base.html" %}

{% block title %}Вход{% endblock %}

{% block content %}
<h3 class="mb-4">Вход</h3>

<form method="post">
    {% csrf_token %}

    <div class="mb-3">
        <label class="form-label">Логин</label>
        <input type="text" name="username" class="form-control app-input">
    </div>

    <div class="mb-3">
        <label class="form-label">Пароль</label>
        <input type="password" name="password" class="form-control app-input">
    </div>

    <button class="app-button w-100">Войти</button>
</form>
{% endblock %}
