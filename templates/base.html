{% load static %}
<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Отчёты{% endblock %}</title>
    <link rel="icon" type="image/x-icon" href="{% static 'favicon.ico' %}">
    <link rel="apple-touch-icon" href="{% static 'favicon.ico' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            color: #070084;
        }
        .app-card {
            background: #1d0088;
            color: white;
            border-radius: 14px;
            padding: 18px;
            text-decoration: none;
            display: block;
        }
        .app-button {
            background: #1d0088;
            color: white;
            border: none;
            border-radius: 14px;
            padding: 14px 18px;
            text-decoration: none;
            display: inline-block;
        }
        .app-input {
            border: 2px solid #070084;
            border-radius: 14px;
        }
    </style>
</head>
<body class="bg-white">
<main class="container py-4" style="max-width: 430px;">
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-success">{{ message }}</div>
        {% endfor %}
    {% endif %}

    {% block content %}{% endblock %}
</main>
</body>
</html>
