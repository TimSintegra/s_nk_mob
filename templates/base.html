{% load static %}
<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Отчёты{% endblock %}</title>
    <link rel="icon" type="image/x-icon" href="{% static 'favicon.ico' %}">
    <link rel="apple-touch-icon" href="{% static 'favicon.ico' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'css/app.css' %}" rel="stylesheet">
</head>
<body>

<div id="toast-container" class="toast-container"></div>

{% block header %}
{% if request.session.master_id %}
<div class="app-header">
    <div class="app-header-inner">
        <div class="app-header-title">СНК МОБ</div>
        <div class="app-header-user">
            {{ request.master.full_name|default:"" }}
            <a href="{% url 'master_logout' %}" class="ms-2 text-decoration-none" style="color: var(--text-muted); font-size: 13px;">
                <img src="{% static 'logout-square-02.svg' %}" alt="Выйти" style="width: 18px; height: 18px; vertical-align: middle;">
            </a>
        </div>
    </div>
</div>
{% endif %}
{% endblock %}

{% block main %}
<main class="container py-3" style="max-width: 430px;">
    {% block content %}{% endblock %}
</main>
{% endblock %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script>
function showToast(message, type) {
    type = type || 'success';
    var icons = {success: '\u2713', error: '\u2717', warning: '\u26a0'};
    var container = document.getElementById('toast-container');
    var toast = document.createElement('div');
    toast.className = 'app-toast app-toast-' + type;
    toast.innerHTML =
        '<span class="app-toast-icon">' + (icons[type] || '') + '</span>' +
        '<span class="app-toast-text">' + message + '</span>' +
        '<button class="app-toast-close" onclick="this.parentElement.remove()">\u00d7</button>';
    container.appendChild(toast);
    setTimeout(function() {
        toast.style.animation = 'toast-out 0.3s ease-in forwards';
        setTimeout(function() { toast.remove(); }, 300);
    }, 4000);
}

{% if messages %}
    {% for message in messages %}
        document.addEventListener('DOMContentLoaded', function() {
            showToast('{{ message|escapejs }}', 'success');
        });
    {% endfor %}
{% endif %}
</script>
{% block extra_js %}{% endblock %}
</body>
</html>
