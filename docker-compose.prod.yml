services:
  web:
    build: .
    container_name: s_nk_mob_web
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      - db
    ports:
      - "${APP_PORT:-9000}:8000"
    volumes:
      - static_volume:/app/staticfiles
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.s-nk-mob.rule=Host(`${APP_DOMAIN:-mob.s-nk.su}`)"
      - "traefik.http.routers.s-nk-mob.entrypoints=https"
      - "traefik.http.routers.s-nk-mob.tls=true"
      - "traefik.http.routers.s-nk-mob.tls.certresolver=letsEncrypt"
      - "traefik.http.services.s-nk-mob.loadbalancer.server.port=8000"
    networks:
      - default
      - proxy

  db:
    image: postgres:16
    container_name: s_nk_mob_db
    restart: unless-stopped
    env_file:
      - .env.production
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - default

volumes:
  postgres_data:
  static_volume:

networks:
  proxy:
    external: true
    name: ${TRAEFIK_NETWORK:-docker_proxy-server-net}
